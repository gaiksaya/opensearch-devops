name: Trigger nightly playground deployment

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 0 * * *'

jobs:   
  deploy-nightly-playground-2x:
    uses: ./.github/workflows/nightly-playground-deploy.yml
    secrets: inherit
    with:
      dist_version: 2.17.0

  deploy-nightly-playground-3x:
    uses: ./.github/workflows/nightly-playground-deploy.yml
    secrets: inherit
    with:
      dist_version: 3.0.0